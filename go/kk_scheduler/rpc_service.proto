edition = "2023";

package kk_scheduler;

option go_package = "/kk_scheduler";

import "kk_scheduler/Job.proto";
import "kk_scheduler/Service.proto";
import "kk_scheduler/TaskExecution.proto";
import "kk_scheduler/extend_field.proto";

service KKSchedule {
  rpc JobList(JobList.Input) returns (JobList.Output);
  rpc JobGet(JobGet.Input) returns (JobGet.Output);
  rpc JobSetSpec(JobSetSpec.Input) returns (JobSetSpec.Output);
  rpc JobEnable(JobEnable.Input) returns (JobEnable.Output);
  rpc JobDisable(JobDisable.Input) returns (JobDisable.Output);
  rpc JobPut(JobPut.Input) returns (JobPut.Output);
  rpc JobDelete(JobDelete.Input) returns (JobDelete.Output);
  rpc JobTrigger(JobTrigger.Input) returns (JobTrigger.Output);

  rpc ServiceList(ServiceList.Input) returns (ServiceList.Output);
  rpc ServicePut(ServicePut.Input) returns (ServicePut.Output);
  rpc ServiceGet(ServiceGet.Input) returns (ServiceGet.Output);
  rpc ServiceDelete(ServiceDelete.Input) returns (ServiceDelete.Output);

  rpc TaskCreate(TaskCreate.Input) returns (TaskCreate.Output);
  rpc TaskUpdateStatus(TaskUpdateStatus.Input) returns (TaskUpdateStatus.Output);
  rpc TaskAppendLog(TaskAppendLog.Input) returns (TaskAppendLog.Output);
  rpc TaskExecutionList(TaskExecutionList.Input) returns (TaskExecutionList.Output);
  rpc TaskExecutionGet(TaskExecutionGet.Input) returns (TaskExecutionGet.Output);
  rpc TaskExecutionDelete(TaskExecutionDelete.Input) returns (TaskExecutionDelete.Output);
}


service KKScheduleTrigger {
  rpc Trigger(Trigger.Input) returns (Trigger.Output);
}

message Trigger {
  message Input {
    string funcName = 1;
    string jobId = 2[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }
  message Output {
  }
}