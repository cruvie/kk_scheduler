edition = "2023";
package kk_scheduler;
option go_package = "/kk_scheduler";
import "google/protobuf/descriptor.proto";

extend google.protobuf.MethodOptions {
  repeated  InterceptorAuth interceptor_auth_list = 1001;

  string api_name = 1002;
}

// 认证拦截器 最多只能配置一个
enum InterceptorAuth {
  UNSPECIFIED = 0;
  // JWT认证拦截器
  JWT = 1;
  // 内部调用拦截器
  InternalOnly = 2;
}
