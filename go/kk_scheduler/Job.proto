edition = "2023";
package kk_scheduler;

option go_package = "/kk_scheduler";
import "google/protobuf/timestamp.proto";
import "kk_scheduler/extend_field.proto";
import "kk_scheduler/Base.proto";


message JobEnable {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }

  message Output {

  }
}

message JobDisable {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }

  message Output {

  }
}

message JobDelete {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }

  message Output {

  }
}

message JobGet {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }

  message Output {
    PBJob Job  = 1;
  }
}

message JobList {
  message Input {
    string serviceName = 1;
  }

  message Output {
    repeated PBJob JobList = 1;
  }
}


message JobPut {
  message Input {
    PBRegisterJob Job = 1;
  }

  message Output {
  }
}
message JobSetSpec {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
    string spec = 2[(field_behavior) = REQUIRED];
  }

  message Output {
  }
}


message JobTrigger {
  message Input {
    string Id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }

  message Output {

  }
}